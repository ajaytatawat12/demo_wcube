<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard UI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f2fb;
padding:18px;
}

.top{
display:flex;
gap:12px;
align-items:center;
}

.menu,
.scan{
width:55px;
height:55px;
border-radius:18px;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
box-shadow:0 2px 10px #ddd;
}

.search{
flex:1;
height:55px;
background:white;
border-radius:18px;
display:flex;
align-items:center;
padding:15px;
color:#777;
font-size:22px;
}

.search input{
border:none;
outline:none;
width:100%;
font-size:18px;
margin-left:10px;
}

.cards{
display:flex;
gap:15px;
margin-top:25px;
}

.card{
flex:1;
background:white;
border-radius:25px;
padding:18px;
min-height:250px;
box-shadow:0 2px 15px #e4e4e4;
}

.card h3{
color:#666;
}

.big{
font-size:70px;
text-align:center;
margin:20px 0;
}

.btn{
background:black;
color:white;
padding:15px;
text-align:center;
border-radius:14px;
margin-top:20px;
}

.section{
margin-top:30px;
background:white;
border-radius:25px;
padding:18px;
}

.row{
display:flex;
justify-content:space-between;
}

.items{
display:flex;
gap:18px;
margin-top:20px;
flex-wrap:wrap;
}

.item{
width:70px;
text-align:center;
}

.circle{
width:80px;
height: 90px;
background:#efefff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;

}

.item p{
margin-top:10px;
font-size:15px;
line-height: 100px;
}

.bottom{
position:fixed;
left:0;
right:0;
bottom:0;

background:white;

display:flex;
justify-content:space-around;

padding:14px;
box-shadow:0 -2px 10px #ddd;
}

.tab{
text-align:center;
}

.active{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top">

<div class="menu">☰</div>

<div class="search">
🔍
<input placeholder="Search">
</div>

<div class="scan">⌁</div>

</div>

<div class="cards">

<div class="card">

<h3>SERVICES</h3>

<div class="big">
🛵
</div>

<div class="btn">
Explore
</div>

</div>

<div class="card">

<h3>WALLET</h3>

<h1 style="margin-top:30px">
o.
</h1>

<p style="margin-top:15px;color:gray">
Available Balance
</p>

<div class="btn">
View Account
</div>

</div>

</div>


<h1 style="margin:30px 10px">
Products
</h1>

<div class="section">

<div class="row">
<h2>New Connections</h2>
<h3 style="color:#2979ff"></h3>
</div>

<div class="items">

<div class="item">
<div class="circle">📶</div>
<p>Wi-Fi</p>
</div>

<div class="item">
<div class="circle">🏦</div>
<p>Bank</p>
</div>

<div class="item">
<div class="circle">📡</div>
<p>DTH</p>
</div>

<div class="item">
<div class="circle">💳</div>
<p>Card</p>
</div>

</div>

<hr style="margin:25px 0">

<div class="row">
<h2>Finance</h2>
<h3 style="color:#2979ff"></h3>
</div>

<div class="items">

<div class="item">
<div class="circle">💰</div>
<p>deposite</p>
</div>

<div class="item">
<div class="circle">🏆</div>
<p>Gold</p>
</div>

<div class="item">
<div class="circle">💳</div>
<p>Credit</p>
</div>

<div class="item">
<div class="circle">⚡</div>
<p>EMI</p>
</div>

</div>

</div>


<div class="bottom">

<div class="tab active">
🏠
<div>home</div>
</div>

<div class="tab">
💸
<div>pay</div>
</div>

<div class="tab">
🛍️
<div>shop</div>
</div>

<div class="tab">
❓
<div>help</div>
</div>

</div>

<script>

document
.querySelector(".btn")
.onclick=function(){

alert("Opened");

}

</script>

</body>
</html>
